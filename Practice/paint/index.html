<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paint</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="window-dots" aria-hidden="true"><span></span><span></span><span></span></div>
      <div class="brand">Paint</div>
      <div class="history-controls" aria-label="History">
        <button class="icon-button" data-history="undo" title="Undo" aria-label="Undo">↶</button>
        <button class="icon-button" data-history="redo" title="Redo" aria-label="Redo">↷</button>
      </div>
      <div class="file-controls">
        <button id="clear" class="secondary" data-action="clear" title="Clear canvas" aria-label="Clear canvas"><span aria-hidden="true">⌫</span><span>Clear</span></button>
        <button id="save" class="primary" data-action="save" title="Save PNG" aria-label="Save PNG"><span aria-hidden="true">⇩</span><span>PNG Save</span></button>
      </div>
    </header>

    <main>
      <aside class="toolbar" aria-label="Drawing tools">
        <p class="tool-label">Tools</p>
        <div class="tool-grid">
          <button class="tool active" data-tool="pencil" title="Pencil"><span>✎</span><small>Pencil</small></button>
          <button class="tool" data-tool="eraser" title="Eraser"><span>▱</span><small>Eraser</small></button>
          <button class="tool" data-tool="picker" title="Color Picker"><span>◉</span><small>Color Picker</small></button>
          <button class="tool" data-tool="line" title="Line"><span>╱</span><small>Line</small></button>
          <button class="tool" data-tool="rectangle" title="Rectangle"><span>□</span><small>Rectangle</small></button>
          <button class="tool" data-tool="ellipse" title="Ellipse"><span>○</span><small>Ellipse</small></button>
        </div>

        <div class="control-section">
          <label for="size">Brush size <strong id="size-value">8 px</strong></label>
          <input id="size" type="range" min="1" max="50" value="8" />
          <div class="size-dots"><i></i><i></i><i></i><i></i></div>
        </div>

        <div class="control-section">
          <p class="tool-label">Color Picker</p>
          <div class="color-row">
            <input id="color-picker" type="color" value="#24293c" aria-label="Custom color" />
            <span id="color-value">#24293C</span>
          </div>
          <div class="swatches" id="swatches"></div>
        </div>
      </aside>

      <section class="work-area">
        <div class="canvas-wrap"><canvas id="canvas" width="1200" height="760"></canvas></div>
        <div class="bottom-panel" aria-label="Canvas controls">
          <div class="bottom-history" aria-label="History">
            <button class="icon-button" data-history="undo" title="Undo" aria-label="Undo">↶</button>
            <button class="icon-button" data-history="redo" title="Redo" aria-label="Redo">↷</button>
          </div>
          <p class="canvas-status"><span id="active-tool">Pencil</span><span>1200 × 760</span></p>
          <div class="bottom-actions" aria-label="Canvas actions">
            <button class="secondary compact" data-action="clear" title="Clear canvas" aria-label="Clear canvas"><span aria-hidden="true">⌫</span><span>Clear</span></button>
            <button class="primary compact" data-action="save" title="Save PNG" aria-label="Save PNG"><span aria-hidden="true">⇩</span><span>PNG Save</span></button>
          </div>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
